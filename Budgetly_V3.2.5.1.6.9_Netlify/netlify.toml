[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/reset-password"
  to = "/reset-password.html"
  status = 200

[[redirects]]
  from = "/reset-password/"
  to = "/reset-password.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
